<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineer — Curriculum</title>
<script src="config.js" onerror="window.__configMissing=true"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14.5px;
  line-height: 1.6;
  color: #1e293b;
  background: #f8fafc;
  min-height: 100vh;
}

.app {
  display: flex;
  min-height: 100vh;
}

/* ─────── Sidebar toggle button ─────── */
.sidebar-toggle {
  position: fixed;
  top: 14px;
  left: 12px;
  z-index: 300;
  background: #0f172a;
  color: #94a3b8;
  border: none;
  border-radius: 6px;
  padding: 7px 11px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: left 0.25s ease, background 0.15s, color 0.15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.18);
}
.sidebar-toggle:hover { background: #1e293b; color: #e2e8f0; }

/* ─────── Sidebar ─────── */
.sidebar {
  background: #0f172a;
  color: #cbd5e1;
  padding: 22px 18px;
  border-right: 1px solid #1e293b;
  width: 0;
  min-width: 0;
  flex-shrink: 0;
  overflow: hidden;
  max-height: 100vh;
  position: sticky;
  top: 0;
  transition: width 0.25s ease;
  white-space: nowrap;
}
.app.sidebar-open .sidebar {
  width: 300px;
  overflow-y: auto;
  white-space: normal;
}
.sidebar-brand {
  font-size: 15px;
  font-weight: 800;
  color: #f8fafc;
  letter-spacing: -0.3px;
  margin-bottom: 2px;
}
.sidebar-tag {
  font-size: 10.5px;
  color: #64748b;
  margin-bottom: 18px;
  letter-spacing: 0.06em;
}

.cat { margin-bottom: 1px; }
.cat-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  color: #e2e8f0;
  font-size: 12.5px;
  font-weight: 600;
  user-select: none;
  gap: 8px;
}
.cat-head:hover { background: #1e293b; }
.cat-name { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0; }
.cat-chev { font-size: 8px; color: #64748b; transition: transform 0.15s; flex-shrink: 0; }
.cat.open .cat-chev { transform: rotate(90deg); }
.cat-count { font-size: 10px; color: #64748b; background: #1e293b; padding: 2px 7px; border-radius: 9px; font-weight: 500; flex-shrink: 0; }
.cat-count.has-done { color: #22c55e; }

.subs { display: none; padding: 2px 0 6px 18px; }
.cat.open .subs { display: block; }

.sub {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 10px;
  font-size: 12px;
  color: #94a3b8;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 1px;
}
.sub:hover { background: #1e293b; color: #cbd5e1; }
.sub.active { background: #1d4ed8; color: #fff; }
.sub.done { color: #22c55e; }
.sub.inprogress { color: #fbbf24; }
.sub-mark { width: 10px; flex-shrink: 0; font-size: 10px; text-align: center; }

.sidebar-section { margin-top: 24px; border-top: 1px solid #1e293b; padding-top: 16px; }
.sidebar-section h3 {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #64748b;
  margin-bottom: 8px;
}
.src { font-size: 11px; padding: 2px 0; color: #94a3b8; line-height: 1.45; }
.src a { color: #94a3b8; text-decoration: none; }
.src a:hover { color: #cbd5e1; }
.src-who { font-weight: 600; color: #cbd5e1; }

/* ─────── Main ─────── */
.main {
  flex: 1;
  min-width: 0;
  padding: 32px 40px 80px 56px;  /* left room for toggle button when sidebar closed */
  max-width: 940px;
  overflow-x: hidden;
}
.app.sidebar-open .main {
  padding-left: 40px;
}

.welcome { padding: 60px 0; text-align: center; }
.welcome h1 { font-size: 30px; color: #0f172a; margin-bottom: 14px; letter-spacing: -0.5px; font-weight: 800; }
.welcome p { color: #475569; font-size: 14.5px; max-width: 560px; margin: 0 auto 14px; }
.welcome p.sub-tag { font-size: 12.5px; color: #94a3b8; margin-top: 22px; }

.flow {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 20px 24px;
  max-width: 560px;
  margin: 30px auto 0;
  text-align: left;
}
.flow h4 { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #94a3b8; margin-bottom: 10px; }
.flow ol { list-style: none; counter-reset: flow; }
.flow ol li { counter-increment: flow; padding: 4px 0 4px 26px; position: relative; font-size: 13px; color: #334155; }
.flow ol li::before {
  content: counter(flow);
  position: absolute; left: 0; top: 4px;
  width: 18px; height: 18px; border-radius: 50%;
  background: #0f172a; color: #fff;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* Subtopic header */
.sub-header {
  margin-bottom: 24px;
  padding-bottom: 18px;
  border-bottom: 2px solid #0f172a;
}
.sub-breadcrumb { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #64748b; font-weight: 600; margin-bottom: 6px; }
.sub-title { font-size: 26px; font-weight: 800; color: #0f172a; letter-spacing: -0.4px; margin-bottom: 4px; }
.sub-desc { font-size: 14px; color: #475569; }
.sub-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

.btn {
  font-size: 12.5px;
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid #cbd5e1;
  background: #fff;
  color: #1e293b;
  cursor: pointer;
  font-weight: 600;
  font-family: inherit;
}
.btn:hover { background: #f1f5f9; }
.btn-primary { background: #0f172a; color: #fff; border-color: #0f172a; }
.btn-primary:hover { background: #1e293b; }
.btn-ghost { background: transparent; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { font-size: 11.5px; padding: 5px 10px; }

/* Overview card */
.sub-overview {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 22px;
}
.ov-col { margin-bottom: 14px; }
.ov-col:last-child { margin-bottom: 0; }
.ov-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; }
.ov-list { list-style: none; }
.ov-list li { font-size: 13.5px; color: #1e293b; padding: 3px 0 3px 18px; position: relative; }
.ov-list li::before { content: '▸'; position: absolute; left: 0; color: #2563eb; font-size: 10px; top: 5px; }
.ov-why { font-size: 13.5px; color: #1e40af; background: #eff6ff; padding: 10px 12px; border-radius: 6px; border-left: 3px solid #2563eb; line-height: 1.6; }

/* Concept tabs */
.concept-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 16px;
  border-bottom: 2px solid #e2e8f0;
  flex-wrap: wrap;
}
.c-tab {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  display: flex;
  align-items: center;
  gap: 7px;
  user-select: none;
}
.c-tab:not(.locked):hover { color: #1e293b; }
.c-tab.active { color: #0f172a; border-bottom-color: #0f172a; }
.c-tab.locked { color: #cbd5e1; cursor: not-allowed; }
.c-tab-mark { font-size: 11px; }
.c-tab.done .c-tab-mark { color: #10b981; }
.c-tab.active .c-tab-mark { color: #0f172a; }

/* Concept card */
.concept-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 22px 24px;
  margin-bottom: 18px;
}
.concept-title { font-size: 20px; font-weight: 800; color: #0f172a; letter-spacing: -0.3px; margin-bottom: 6px; }
.concept-summary { font-size: 14px; color: #475569; font-style: italic; margin-bottom: 18px; }

.section-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #94a3b8;
  margin: 22px 0 12px;
}
.section-label:first-of-type { margin-top: 0; }

.kp { padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
.kp:last-child { border-bottom: none; }
.kp-point { font-weight: 600; font-size: 13.5px; color: #0f172a; margin-bottom: 5px; }
.kp-exp { font-size: 13px; color: #334155; line-height: 1.7; margin-bottom: 6px; }
.kp-ex { font-size: 12.5px; color: #475569; background: #f8fafc; padding: 7px 10px; border-radius: 5px; border-left: 3px solid #94a3b8; line-height: 1.6; }
.kp-ex-label { font-weight: 700; color: #64748b; letter-spacing: 0.1em; font-size: 10px; display: block; margin-bottom: 3px; }

.pattern, .antipattern, .pitfall {
  padding: 10px 12px;
  border-radius: 6px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.65;
}
.pattern { background: #ecfdf5; border-left: 3px solid #10b981; }
.antipattern { background: #fef2f2; border-left: 3px solid #ef4444; }
.pitfall { background: #fffbeb; border-left: 3px solid #f59e0b; }
.p-head { font-weight: 700; color: #0f172a; margin-bottom: 4px; font-size: 12.5px; }
.p-body { color: #334155; font-size: 12.5px; }
.p-tag { display: inline-block; font-size: 10px; letter-spacing: 0.12em; font-weight: 700; margin-right: 6px; padding: 1px 6px; border-radius: 3px; }
.p-tag.do { background: #d1fae5; color: #065f46; }
.p-tag.dont { background: #fee2e2; color: #991b1b; }
.p-tag.pit { background: #fef3c7; color: #92400e; }

.src-list { display: flex; flex-direction: column; gap: 6px; }
.src-item { font-size: 12.5px; line-height: 1.5; }
.src-item a { color: #2563eb; text-decoration: none; font-weight: 600; }
.src-item a:hover { text-decoration: underline; }
.src-note { color: #64748b; font-size: 11.5px; display: block; margin-top: 2px; }

/* MCQ options */
.mcq-options { display: flex; flex-direction: column; gap: 6px; margin: 10px 0 4px; }
.mcq-opt {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 7px;
  border: 1.5px solid #e2e8f0;
  cursor: pointer;
  font-size: 13.5px;
  line-height: 1.55;
  transition: border-color 0.12s, background 0.12s;
  background: #fff;
}
.mcq-opt:hover:not(.mcq-correct):not(.mcq-wrong):not(.mcq-dim) { border-color: #94a3b8; background: #f8fafc; }
.mcq-opt input[type="radio"] { margin-top: 3px; flex-shrink: 0; accent-color: #2563eb; }
.mcq-selected { border-color: #2563eb; background: #eff6ff; }
.mcq-correct  { border-color: #10b981; background: #ecfdf5; }
.mcq-wrong    { border-color: #ef4444; background: #fef2f2; }
.mcq-dim      { opacity: 0.45; }
.mcq-key  { font-weight: 700; color: #475569; min-width: 18px; flex-shrink: 0; }
.mcq-text { flex: 1; color: #1e293b; }
.mcq-icon { font-size: 14px; font-weight: 700; flex-shrink: 0; margin-left: 4px; }
.mcq-correct .mcq-icon { color: #059669; }
.mcq-wrong .mcq-icon   { color: #dc2626; }
.mcq-explanation {
  font-size: 12.5px;
  color: #334155;
  background: #f0fdf4;
  border-left: 3px solid #10b981;
  padding: 8px 12px;
  border-radius: 0 5px 5px 0;
  margin-top: 4px;
  line-height: 1.6;
}

/* Q&A */
.qa-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 20px 22px;
  margin-bottom: 18px;
}
.qa-head { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #475569; font-weight: 700; margin-bottom: 14px; }
.qa-item { margin-bottom: 18px; }
.qa-item:last-of-type { margin-bottom: 10px; }
.qa-q { font-weight: 600; color: #0f172a; margin-bottom: 8px; font-size: 13.5px; line-height: 1.55; }
.qa-a {
  width: 100%;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  min-height: 70px;
  line-height: 1.6;
}
.qa-a:focus { outline: none; border-color: #2563eb; }
.qa-eval { background: #f8fafc; border-radius: 7px; padding: 14px 16px; margin-top: 16px; border: 1px solid #e2e8f0; }
.qa-eval.passed { background: #ecfdf5; border-color: #a7f3d0; }
.qa-eval.failed { background: #fef2f2; border-color: #fecaca; }
.qa-score { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
.qa-score.passed { color: #059669; }
.qa-score.failed { color: #dc2626; }
.qa-verdict { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #64748b; margin-bottom: 8px; }
.qa-feedback { font-size: 13px; color: #334155; line-height: 1.7; white-space: pre-wrap; }
.qa-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

/* Lab */
.lab-gate {
  background: #fff7ed;
  border: 1px dashed #fdba74;
  border-radius: 10px;
  padding: 16px 20px;
  color: #9a3412;
  font-size: 13px;
  margin-top: 20px;
  text-align: center;
}
.lab-gate b { color: #7c2d12; }

.lab-card {
  background: #fff;
  border: 2px solid #0f172a;
  border-radius: 12px;
  padding: 24px 26px;
  margin: 28px 0;
}
.lab-eyebrow { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #dc2626; font-weight: 700; margin-bottom: 8px; }
.lab-title { font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -0.3px; margin-bottom: 8px; }
.lab-build { font-size: 14px; color: #1e293b; margin-bottom: 8px; line-height: 1.6; }
.lab-why { font-size: 13px; color: #1e40af; background: #eff6ff; padding: 9px 12px; border-radius: 6px; border-left: 3px solid #2563eb; margin-bottom: 14px; line-height: 1.6; }
.lab-meta { display: flex; gap: 20px; font-size: 12px; color: #64748b; margin-bottom: 16px; flex-wrap: wrap; }
.lab-meta span strong { color: #1e293b; font-weight: 600; }

.lab-prereq {
  background: #fef3c7;
  border: 1px solid #fcd34d;
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 16px;
}
.lab-prereq .ov-label { color: #b45309; margin-bottom: 8px; }
.lab-prereq ul { list-style: none; }
.lab-prereq li { font-size: 13px; color: #78350f; padding: 3px 0 3px 20px; position: relative; line-height: 1.55; }
.lab-prereq li::before { content: '☐'; position: absolute; left: 0; font-weight: 700; }

.lab-options { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.opt-tab {
  padding: 10px 14px;
  font-size: 12.5px;
  font-weight: 600;
  color: #64748b;
  cursor: pointer;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  background: #fff;
  flex: 1;
  min-width: 200px;
  text-align: center;
}
.opt-tab:hover { color: #1e293b; }
.opt-tab.active { background: #0f172a; color: #fff; border-color: #0f172a; }

.opt-meta { display: flex; gap: 18px; font-size: 11.5px; color: #64748b; margin-bottom: 10px; flex-wrap: wrap; }
.opt-meta b { color: #1e293b; }
.opt-tradeoff { font-size: 12.5px; color: #475569; background: #f8fafc; padding: 8px 12px; border-radius: 5px; border-left: 3px solid #64748b; margin-bottom: 14px; }

.setup-steps { list-style: none; margin-bottom: 16px; background: #f8fafc; padding: 12px 14px; border-radius: 6px; }
.setup-steps li { font-size: 12.5px; color: #334155; padding: 3px 0 3px 18px; position: relative; line-height: 1.55; }
.setup-steps li::before { content: '→'; position: absolute; left: 0; color: #64748b; font-weight: 700; }

.step { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid #f1f5f9; }
.step:last-of-type { border-bottom: none; }
.step-n {
  width: 24px; height: 24px; flex-shrink: 0;
  border-radius: 50%; background: #0f172a; color: #fff;
  font-size: 11.5px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin-top: 2px;
}
.step-body { flex: 1; min-width: 0; }
.step-do { font-size: 13.5px; color: #0f172a; margin-bottom: 6px; line-height: 1.55; }
.step-code {
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 12px;
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  white-space: pre-wrap;
  word-break: break-word;
  margin-bottom: 6px;
  overflow-x: auto;
  line-height: 1.5;
}
.step-verify { font-size: 12px; color: #059669; padding-left: 10px; border-left: 2px solid #10b981; line-height: 1.5; }
.step-verify::before { content: '✓ verify — '; font-weight: 700; letter-spacing: 0.06em; font-size: 10.5px; }

.lab-verify { background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 8px; padding: 14px 16px; margin-top: 16px; }
.lab-verify .ov-label { color: #065f46; }
.lab-verify ul { list-style: none; }
.lab-verify li { font-size: 13px; color: #065f46; padding: 3px 0 3px 22px; position: relative; line-height: 1.55; }
.lab-verify li::before { content: '✓'; position: absolute; left: 2px; font-weight: 700; color: #10b981; }

.lab-output { background: #f1f5f9; border-radius: 6px; padding: 10px 12px; margin-top: 12px; font-size: 12.5px; color: #334155; line-height: 1.6; }
.lab-output b { color: #0f172a; }

.lab-stretch { background: #ede9fe; border-radius: 6px; padding: 10px 12px; margin-top: 10px; font-size: 12.5px; color: #4c1d95; line-height: 1.6; }
.lab-stretch b { color: #312e81; }

.lab-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

/* Lab ask-bar */
.ask-card {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 18px 20px;
  margin-top: 16px;
}
.ask-head { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #475569; font-weight: 700; margin-bottom: 6px; }
.ask-tag { font-size: 11.5px; color: #64748b; margin-bottom: 12px; }
.ask-hist { max-height: 340px; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
.ask-msg { font-size: 13px; line-height: 1.65; padding: 8px 12px; border-radius: 8px; max-width: 92%; }
.ask-msg.user { background: #dbeafe; color: #1e293b; align-self: flex-end; }
.ask-msg.ai { background: #fff; color: #1e293b; border: 1px solid #e2e8f0; align-self: flex-start; white-space: pre-wrap; }
.ask-row { display: flex; gap: 8px; }
.ask-input {
  flex: 1;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  padding: 9px 12px;
  font-size: 13px;
  font-family: inherit;
}
.ask-input:focus { outline: none; border-color: #2563eb; }

/* Loader / error */
.loader { padding: 60px 0; text-align: center; color: #64748b; font-size: 13px; }
.loader-dots { letter-spacing: 4px; color: #94a3b8; font-size: 20px; margin-top: 10px; }
.loader-dot { display: inline-block; animation: blink 1.4s infinite; }
.loader-dot:nth-child(2) { animation-delay: 0.2s; }
.loader-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

.error-card {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 8px;
  padding: 16px 18px;
  color: #7f1d1d;
  font-size: 13px;
  margin: 16px 0;
  line-height: 1.6;
}
.error-card b { color: #991b1b; }
.error-card code { background: #fee2e2; padding: 1px 6px; border-radius: 3px; font-family: 'Consolas', monospace; font-size: 12px; }
.error-card .lab-actions { margin-top: 10px; }

/* Write-up card (Substack + social) */
.writeup-card {
  background: #fff;
  border: 2px solid #8b5cf6;
  border-radius: 12px;
  padding: 22px 24px;
  margin: 28px 0;
}
.writeup-head {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #7c3aed;

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function extractJSON(raw) {
  if (!raw) throw new Error('Empty response');
  let t = String(raw).trim();
  // Strip markdown fences if present
  if (t.startsWith('```')) {
    t = t.replace(/^```(?:json|JSON)?\s*\n?/, '').replace(/\n?```\s*$/, '');
    t = t.trim();
  }
  const first = t.indexOf('{');
  if (first < 0) throw new Error('No JSON object found in response');
  let depth = 0, inStr = false, esc2 = false, end = -1;
  for (let i = first; i < t.length; i++) {
    const c = t[i];
    if (esc2) { esc2 = false; continue; }
    if (c === '\\' && inStr) { esc2 = true; continue; }
    if (c === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{') depth++;
    else if (c === '}') { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end < 0) throw new Error('Unterminated JSON object — response may be truncated');
  return JSON.parse(t.slice(first, end + 1));
}

// ═══════════════════════════════════════════════════════════════════════════
//  CLAUDE API
// ═══════════════════════════════════════════════════════════════════════════
async function callClaude({ model, system, messages, max_tokens, temperature = 0.4 }) {
  const body = { model, max_tokens, messages };
  if (model !== OPUS) body.temperature = temperature;  // temperature deprecated on Opus 4.7
  if (system) body.system = system;
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  if (!res.ok) {
    let msg = text;
    try { msg = JSON.parse(text)?.error?.message || text; } catch {}
    throw new Error(`Claude API ${res.status}: ${msg.slice(0, 400)}`);
  }
  let j;
  try { j = JSON.parse(text); }
  catch { throw new Error('Proxy returned non-JSON: ' + text.slice(0, 200)); }
  if (j.error) throw new Error(`Claude: ${j.error.message || JSON.stringify(j.error)}`);
  if (j.stop_reason === 'max_tokens') {
    // Surface truncation clearly so generator can retry or fail visibly
    console.warn('Claude stopped at max_tokens — response may be truncated');
  }
  const out = j.content?.[0]?.text;
  if (!out) throw new Error('No text in Claude response: ' + JSON.stringify(j).slice(0, 300));
  return { text: out, stop_reason: j.stop_reason, usage: j.usage };
}

async function fileCachePut(subId, data) {

      body: JSON.stringify({ id: subId, data }),

  } catch (e) { console.warn('File cache write failed (proxy down?):', e.message); }
}

// Split into two calls so each stays well within Opus output limits (~3-4K tokens each).
// onProgress(msg) lets the caller update the loader between steps.
async function generateSubtopic(meta, onProgress) {
  const part1 = await generateConceptsPart(meta, onProgress);
  const lab   = await generateLabPart(meta, part1.concepts, onProgress);
  return { ...part1, lab };
}

function _opusSystem(extra) {
  return `You are an AI engineering pioneer generating world-class learning content for a senior engineer (20 years experience, transitioning from enterprise sales to production AI). They work ACROSS industries — NEVER frame as regulated-industry-specific.

VOICE — channel (don't quote): Chip Huyen's systems clarity · Hamel Husain's evals rigor · Simon Willison's pragmatism · Karpathy's first-principles · Jason Liu's code-first examples · Lance Martin's production RAG · Sebastian Raschka's precision.

QUALITY (non-negotiable):
- Every claim SPECIFIC. "use recursive chunking at 512 tokens with 64-token overlap" not "use good chunking".
- Every code snippet must run. Real imports, real params. No "# your code here".
- Patterns: "DO X because Y, apply when Z".
- Antipatterns: "DON'T X — breaks because Y. Instead Z".
- Pitfalls: symptom the learner actually sees · cause · concrete fix.
- Source URLs ONLY from: ${approvedSourcesText()}

Respond with STRICT JSON only. No prose. No markdown fences.
${extra || ''}`;
}

async function generateConceptsPart(meta, onProgress) {
  onProgress?.('Generating concepts (1 of 2) — ~30–60s');
  const system = _opusSystem(`
SCHEMA:
{
  "overview": {
    "plan_to_learn":    ["string"],   // 3-5 items
    "you_will_achieve": ["string"],   // 3-4 outcomes — what the learner can DO
    "why_it_matters":   "string"      // 2-3 sentences
  },
  "concepts": [                       // EXACTLY 3, sequenced foundational -> applied -> production
    {
      "id": "c1",
      "title": "string",
      "summary": "string",            // 1-sentence hook
      "key_points": [
        { "point": "string", "explanation": "string", "example": "string" }
      ],                              // EXACTLY 4 entries
      "patterns":     [{ "do": "string", "why": "string", "when": "string" }],      // 2-3
      "antipatterns": [{ "dont": "string", "why_wrong": "string", "instead": "string" }], // 2-3
      "pitfalls":     [{ "symptom": "string", "cause": "string", "fix": "string" }],      // 2
      "sources":      [{ "name": "string", "url": "string", "what_to_read": "string" }]   // 2
    }
  ]
}`);

  const user = `Category: ${meta.catName} — ${meta.catDesc}
Subtopic: ${meta.name}

Generate overview + 3 concepts sequenced: foundational intuition → practical application → production decisions.
Keep explanations tight — one concrete example per key point, no padding.`;

  const { text, stop_reason } = await callClaude({

async function generateQA(concept) {
  const system = `You generate multiple-choice questions (MCQ) that test FULL understanding of an AI engineering concept across every dimension. Max 10 questions. Respond with JSON only. No prose, no markdown fences.`;

  const kps  = concept.key_points   || [];
  const pats = concept.patterns      || [];
  const aps  = concept.antipatterns  || [];
  const pits = concept.pitfalls      || [];

  const user = `Concept: ${concept.title}
Summary: ${concept.summary}

KEY POINTS (${kps.length}):
${kps.map((k, i) => `${i+1}. ${k.point} — ${k.explanation}${k.example ? ' [e.g. ' + k.example + ']' : ''}`).join('\n')}

PATTERNS (${pats.length}):
${pats.map((p, i) => `${i+1}. DO: ${p.do} | WHY: ${p.why} | WHEN: ${p.when}`).join('\n')}

ANTIPATTERNS (${aps.length}):
${aps.map((p, i) => `${i+1}. DON'T: ${p.dont} | WRONG BECAUSE: ${p.why_wrong} | INSTEAD: ${p.instead}`).join('\n')}

PITFALLS (${pits.length}):
${pits.map((p, i) => `${i+1}. SYMPTOM: ${p.symptom} | CAUSE: ${p.cause} | FIX: ${p.fix}`).join('\n')}

MCQ RULES:
- One question per key point — test application/distinction, NOT bare recall ("what is X?")
- One question per pitfall — "you observe [symptom] — what is happening and what do you do?"
- One question covering patterns vs antipatterns — realistic scenario, pick the right approach
- Total: ${Math.min(kps.length + pits.length + 1, 10)} questions max
- 4 options (A/B/C/D) per question
- Distractors must be PLAUSIBLE — drawn from common misconceptions, antipatterns, or partial truths; not obviously wrong
- correct: the single letter of the right answer
- explanation: 1-2 concise sentences. Tight. Say why correct is right + why the main distractor fails.
- Option text: under 25 words each. No prose paragraphs.
- Question text: under 30 words.

Return JSON:
{
  "questions": [
    {
      "id": "q1",
      "text": "Question text?",
      "options": { "A": "...", "B": "...", "C": "...", "D": "..." },
      "correct": "B",
      "explanation": "B is correct because... The most common wrong choice (A/C/D) fails because..."
    }
  ]
}`;

  const { text, stop_reason } = await callClaude({
    model: SONNET,
    system,
    messages: [{ role: 'user', content: user }],
    max_tokens: 4000,
    temperature: 0.4,
  });
  if (stop_reason === 'max_tokens') throw new Error('MCQ response truncated — regenerate');
  const parsed = extractJSON(text);
  if (!Array.isArray(parsed.questions) || parsed.questions.length === 0) {
    throw new Error('No questions generated');
  }
  // Drop any question missing required fields (survives partial corruption)
  const valid = parsed.questions.filter(q =>
    q.id && q.text && q.options && q.correct && q.explanation &&
    ['A','B','C','D'].includes(q.correct) &&
    Object.keys(q.options).length >= 2
  );
  if (valid.length === 0) throw new Error('No valid MCQ questions returned');
  return valid.slice(0, 10);
}

// MCQ scoring is client-side — no API call needed.
// correct answers + explanations are embedded in the cached questions.
function scoreMCQ(questions, answers) {
  let correct = 0;
  const wrongItems = [];

  questions.forEach(q => {
    const selected = answers[q.id];
    if (selected === q.correct) {
      correct++;
    } else {
      const selectedText = selected ? `You chose ${selected}: "${q.options[selected]}"` : 'Not answered';
      wrongItems.push(`• ${q.text}\n  ${selectedText} — Correct: ${q.correct}: "${q.options[q.correct]}"\n  ${q.explanation}`);
    }
  });

  const total = questions.length;
  const score = Math.round((correct / total) * 100);
  const passed = score >= 70;

  let feedback;
  if (correct === total) {
    feedback = `All ${total} correct. Strong understanding across every dimension.`;
  } else {
    feedback = `${correct}/${total} correct (${score}%).\n\n${wrongItems.join('\n\n')}`;
  }

  return { score, feedback, passed };
}

async function generateWriteup(sub, content) {

  const labContext = `You are helping a learner complete THIS specific lab. ONLY answer questions about this lab. If the learner asks about unrelated AI or programming topics, politely redirect: "That's outside the scope of this lab — let's stay focused. On this lab, you might be asking about X — here's the answer."

Prerequisites:
${(lab.prerequisites || []).map(p => `- ${p}`).join('\n')}

OPTIONS:
${(lab.options || []).map(o => `
=== ${o.name} ===
Compute: ${o.compute}
Tooling: ${o.tooling}
Tradeoffs: ${o.tradeoffs}
Setup:
${(o.setup_steps || []).map(s => `  - ${s}`).join('\n')}
Steps:
${(o.steps || []).map(s => `  ${s.n}. ${s.do}${s.code ? '\n     CODE: ' + s.code : ''}${s.verify ? '\n     VERIFY: ' + s.verify : ''}`).join('\n')}
`).join('\n')}

Expected output: ${lab.expected_output || ''}

  const messages = [];

function computeStats() {
  const totalSub = CURRICULUM.reduce((n, c) => n + c.subtopics.length, 0);
  let subDone = 0, conceptsPassed = 0, labsDone = 0, posts = 0;
  for (const st of Object.values(S.subtopics || {})) {
    if (st.status === 'done') subDone++;
    if (st.lab?.status === 'done') labsDone++;
    if (st.writeup?.status === 'generated') posts++;
    for (const c of Object.values(st.concepts || {})) {
      if (c.status === 'passed') conceptsPassed++;
    }
  }
  return { totalSub, subDone, conceptsPassed, labsDone, posts, pct: Math.round((subDone / totalSub) * 100) };
}

function findResume() {
  // First in-progress subtopic
  for (const [id, st] of Object.entries(S.subtopics || {})) {
    if (st.status === 'inprogress' && st.content) {
      const meta = subMeta(id);
      if (!meta) continue;
      const concepts = st.content.concepts || [];
      const passed = concepts.filter(c => st.concepts[c.id]?.status === 'passed').length;
      let ctx;
      if (passed < concepts.length) ctx = `Concept ${passed + 1} of ${concepts.length}`;
      else if (st.lab?.status !== 'done') ctx = 'Lab in progress';
      else ctx = 'Write-up pending';
      return { meta, ctx };
    }
  }
  return null;
}

// ─── Subtopic view (overview + concept tabs + active concept + lab) ───
function renderSubtopicView(sub, st) {
  const content = st.content;
  const conceptIdx = Math.min(V.activeConcept, content.concepts.length - 1);
  const concept = content.concepts[conceptIdx];
  const cState = st.concepts[concept.id] || { status: 'notstarted' };

  // Gate: concept N is locked until concept N-1 is submitted (any result)
  const gate = idx => {
    if (idx === 0) return false;
    for (let i = 0; i < idx; i++) {
      const prev = content.concepts[i];
      const ps = st.concepts[prev.id];
      if (!ps || !ps.eval) return true;  // locked
    }
    return false;
  };

  const conceptTabs = content.concepts.map((c, i) => {
    const cs = st.concepts[c.id] || {};
    const locked = gate(i);
    const mark = cs.status === 'passed' ? '✓' : (cs.eval ? (cs.eval.passed ? '✓' : '✗') : (locked ? '🔒' : '○'));
    const cls = [
      i === conceptIdx ? 'active' : '',
      cs.status === 'passed' ? 'done' : '',
      locked ? 'locked' : '',
    ].filter(Boolean).join(' ');
    return `<div class="c-tab ${cls}" data-c-idx="${i}" data-locked="${locked ? 1 : 0}">
      <span class="c-tab-mark">${mark}</span>
      <span>Concept ${i+1}</span>
    </div>`;
  }).join('');

  const allConceptsPassed = content.concepts.every(c => st.concepts[c.id]?.status === 'passed');

  return `
    ${subHeaderHtml(sub)}
    ${renderOverview(content.overview)}
    <div class="concept-tabs">${conceptTabs}</div>
    ${renderConceptCard(concept, cState, conceptIdx, content.concepts.length)}
    ${V.qaMode ? renderQACard(concept, cState) : ''}
    ${allConceptsPassed ? renderLabCard(content.lab, st.lab) : renderLabGate(st)}
    ${st.status === 'done' ? renderWriteupCard(sub, st) : ''}
  `;
}

function renderConceptCard(c, cState, idx, total) {
  const passed = cState.status === 'passed';
  const attempted = !!cState.eval;
  const isLast = idx === total - 1;

  const keyPoints = (c.key_points || []).map(k => `
    <div class="kp">
      <div class="kp-point">${esc(k.point)}</div>
      <div class="kp-exp">${esc(k.explanation)}</div>
      ${k.example ? `<div class="kp-ex"><span class="kp-ex-label">example</span>${esc(k.example)}</div>` : ''}
    </div>`).join('');

  const patterns = (c.patterns || []).map(p => `
    <div class="pattern">
      <div class="p-head"><span class="p-tag do">DO</span>${esc(p.do)}</div>
      <div class="p-body"><b>Why:</b> ${esc(p.why)} &nbsp; <b>When:</b> ${esc(p.when)}</div>
    </div>`).join('');

  const antipatterns = (c.antipatterns || []).map(p => `
    <div class="antipattern">
      <div class="p-head"><span class="p-tag dont">DON'T</span>${esc(p.dont)}</div>
      <div class="p-body"><b>Why wrong:</b> ${esc(p.why_wrong)} &nbsp; <b>Instead:</b> ${esc(p.instead)}</div>
    </div>`).join('');

  const pitfalls = (c.pitfalls || []).map(p => `
    <div class="pitfall">
      <div class="p-head"><span class="p-tag pit">PITFALL</span>${esc(p.symptom)}</div>
      <div class="p-body"><b>Cause:</b> ${esc(p.cause)} &nbsp; <b>Fix:</b> ${esc(p.fix)}</div>
    </div>`).join('');

  const sources = (c.sources || []).map(s => `
    <div class="src-item">
      <a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a>
      ${s.what_to_read ? `<span class="src-note">${esc(s.what_to_read)}</span>` : ''}
    </div>`).join('');

  let footer = '';
  if (!V.qaMode) {
    if (passed) {
      footer = `<div class="sub-actions">
        <span class="btn btn-ghost" style="color:#059669;">✓ Q&A passed — ${cState.eval ? cState.eval.score : ''}/100</span>
        ${!isLast ? `<button class="btn btn-primary" data-action="request-next">Request concept ${idx + 2} →</button>` : ''}
      </div>`;
    } else if (attempted) {
      footer = `<div class="sub-actions">
        <span class="btn btn-ghost" style="color:#dc2626;">Q&A attempted — ${cState.eval.score}/100</span>
        <button class="btn" data-action="retake-qa">Retake Q&A</button>
        ${!isLast ? `<button class="btn btn-ghost" data-action="request-next">Skip to concept ${idx + 2} →</button>` : ''}
      </div>`;
    } else {
      footer = `<div class="sub-actions">
        <button class="btn btn-primary" data-action="start-qa">Attempt Q&A</button>
      </div>`;
    }
  }

  return `<div class="concept-card">
    <div class="concept-title">${esc(c.title)}</div>
    <div class="concept-summary">${esc(c.summary)}</div>

    <div class="section-label">Key points</div>
    ${keyPoints}

    <div class="section-label">Patterns</div>
    ${patterns}

    <div class="section-label">Antipatterns</div>
    ${antipatterns}

    <div class="section-label">Pitfalls</div>
    ${pitfalls}

    <div class="section-label">Sources</div>

function renderQACard(concept, cState) {
  if (!cState.questions || cState.questions.length === 0) {
    return `<div class="qa-card">
      <div class="qa-head">MCQ — ${esc(concept.title)}</div>
      <div id="qa-loader" class="loader">Generating questions…
        <div class="loader-dots"><span class="loader-dot">●</span><span class="loader-dot">●</span><span class="loader-dot">●</span></div>
      </div>
    </div>`;
  }

  // Detect old open-ended format (no options field) — prompt regeneration
  const isMCQ = cState.questions[0]?.options;
  if (!isMCQ) {
    return `<div class="qa-card">
      <div class="qa-head">MCQ — ${esc(concept.title)}</div>
      <div class="ov-why" style="margin-bottom:14px;">Questions are in old open-ended format. Regenerate to get MCQs.</div>
      <div class="qa-actions">
        <button class="btn btn-primary" data-action="regen-qa">Regenerate as MCQ</button>
        <button class="btn btn-ghost" data-action="close-qa">Back</button>
      </div>
    </div>`;
  }

  const submitted = !!cState.eval;
  const answers   = cState.answers || {};

  const items = cState.questions.map((q, i) => {
    const optKeys = Object.keys(q.options);
    const selected = answers[q.id];

    const opts = optKeys.map(k => {
      const isSelected = selected === k;
      const isCorrect  = q.correct === k;
      let cls = 'mcq-opt';
      if (submitted) {
        if (isCorrect)                     cls += ' mcq-correct';
        else if (isSelected && !isCorrect) cls += ' mcq-wrong';
        else                               cls += ' mcq-dim';
      } else if (isSelected) {
        cls += ' mcq-selected';
      }
      const icon = submitted ? (isCorrect ? '✓' : (isSelected ? '✗' : '')) : '';
      return `<label class="${cls}">
        <input type="radio" name="${esc(q.id)}" data-qid="${esc(q.id)}" value="${esc(k)}"
          ${isSelected ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
        <span class="mcq-key">${esc(k)}</span>
        <span class="mcq-text">${esc(q.options[k])}</span>
        ${icon ? `<span class="mcq-icon">${icon}</span>` : ''}
      </label>`;
    }).join('');

    const expBlock = (submitted && q.explanation)
      ? `<div class="mcq-explanation">${esc(q.explanation)}</div>` : '';

    return `<div class="qa-item">
      <div class="qa-q">Q${i+1}. ${esc(q.text)}</div>
      <div class="mcq-options">${opts}</div>
      ${expBlock}
    </div>`;
  }).join('');

  let evalBlock = '';
  if (cState.eval) {
    const cls = cState.eval.passed ? 'passed' : 'failed';
    evalBlock = `<div class="qa-eval ${cls}">
      <div class="qa-verdict">${cState.eval.passed ? 'Passed' : 'Not passed'}</div>
      <div class="qa-score ${cls}">${cState.eval.score}/100</div>
      <div class="qa-feedback">${esc(cState.eval.feedback)}</div>
    </div>`;
  }

  const canSubmit = !submitted && Object.keys(answers).length > 0;

  return `<div class="qa-card">
    <div class="qa-head">MCQ — ${esc(concept.title)} &nbsp;<span style="font-weight:400;letter-spacing:0;">(${cState.questions.length} questions)</span></div>
    ${items}
    ${evalBlock}
    <div class="qa-actions">
      ${!submitted
        ? `<button class="btn btn-primary" data-action="submit-qa" ${canSubmit ? '' : 'disabled'}>Submit</button>`
        : `<button class="btn" data-action="submit-qa">Retry</button>`}
      <button class="btn" data-action="regen-qa">New questions</button>
      <button class="btn btn-ghost" data-action="close-qa">Back to concept</button>
    </div>
  </div>`;
}

function renderLabGate(st) {
  const content = st.content;
  const passedCount = content.concepts.filter(c => st.concepts[c.id]?.status === 'passed').length;
  const total = content.concepts.length;
  return `<div class="lab-gate">
    <b>Lab locked</b> — pass Q&A on all ${total} concepts to unlock. (${passedCount}/${total} passed)
  </div>`;
}

function renderLabCard(lab, labState) {
  const optIdx = Math.min(labState.selectedOption || 0, (lab.options || []).length - 1);
  const opt = lab.options[optIdx];
  const optTabs = lab.options.map((o, i) => `
    <div class="opt-tab ${i === optIdx ? 'active' : ''}" data-opt="${i}">${esc(o.name)}</div>`).join('');

  const setupSteps = (opt.setup_steps || []).map(s => `<li>${esc(s)}</li>`).join('');
  const steps = (opt.steps || []).map(s => `
    <div class="step">
      <div class="step-n">${esc(s.n)}</div>
      <div class="step-body">
        <div class="step-do">${esc(s.do)}</div>
        ${s.code ? `<div class="step-code">${esc(s.code)}</div>` : ''}
        ${s.verify ? `<div class="step-verify">${esc(s.verify)}</div>` : ''}
      </div>
    </div>`).join('');

  const prereqs = (lab.prerequisites || []).map(p => `<li>${esc(p)}</li>`).join('');
  const verification = (lab.verification || []).map(v => `<li>${esc(v)}</li>`).join('');
  const sources = (lab.sources || []).map(s => `
    <div class="src-item">
      <a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a>
      ${s.what_to_read ? `<span class="src-note">${esc(s.what_to_read)}</span>` : ''}
    </div>`).join('');

  const status = labState.status;
  const ack = labState.prereqAck;

  let actions = '';
  if (status === 'done') {
    actions = `<span class="btn btn-ghost" style="color:#059669;">✓ Lab marked done</span>
               <button class="btn" data-action="reset-lab">Reset lab</button>`;
  } else if (status === 'inprogress') {
    actions = `<button class="btn btn-primary" data-action="mark-lab-done">Mark lab done</button>
               <button class="btn" data-action="reset-lab">Reset</button>`;
  } else {
    actions = `<button class="btn btn-primary" data-action="start-lab" ${ack ? '' : 'disabled'}>
                 ${ack ? 'Start lab' : 'Acknowledge prerequisites first'}
               </button>`;
  }

  const chat = (labState.chat || []).map(m =>
    `<div class="ask-msg ${m.role === 'user' ? 'user' : 'ai'}">${esc(m.text)}</div>`).join('');

  return `<div class="lab-card">
    <div class="lab-eyebrow">Hands-on lab</div>
    <div class="lab-title">${esc(lab.title)}</div>
    <div class="lab-build">${esc(lab.what_you_build)}</div>
    ${lab.why_this_lab ? `<div class="lab-why">${esc(lab.why_this_lab)}</div>` : ''}
    <div class="lab-meta">
      <span><strong>Time:</strong> ${esc(lab.estimated_time || '—')}</span>
      <span><strong>Covers:</strong> ${esc((lab.covers_concepts || []).join(', '))}</span>
    </div>

    <div class="lab-prereq">
      <div class="ov-label">Prerequisites</div>
      <ul>${prereqs}</ul>
      <div class="sub-actions" style="margin-top:10px;">
        <label style="font-size:12.5px; display:flex; align-items:center; gap:8px; cursor:pointer; color:#78350f;">
          <input type="checkbox" data-action="prereq-ack" ${ack ? 'checked' : ''} ${status !== 'notstarted' ? 'disabled' : ''}>
          I have all prerequisites ready
        </label>
      </div>
    </div>

    <div class="lab-options">${optTabs}</div>

    <div class="opt-meta">
      <span><b>Compute:</b> ${esc(opt.compute)}</span>
      <span><b>Cost:</b> ${esc(opt.cost)}</span>
      <span><b>Tooling:</b> ${esc(opt.tooling)}</span>
    </div>
    <div class="opt-tradeoff"><b>Tradeoffs:</b> ${esc(opt.tradeoffs)}</div>

    ${setupSteps ? `<div class="section-label">Setup</div><ul class="setup-steps">${setupSteps}</ul>` : ''}

    <div class="section-label">Steps</div>
    ${steps}

    <div class="lab-verify">
      <div class="ov-label">You're done when</div>
      <ul>${verification}</ul>
    </div>

    ${lab.expected_output ? `<div class="lab-output"><b>Expected output:</b> ${esc(lab.expected_output)}</div>` : ''}
    ${lab.stretch ? `<div class="lab-stretch"><b>Stretch:</b> ${esc(lab.stretch)}</div>` : ''}

    ${sources ? `<div class="section-label">Sources</div><div class="src-list">${sources}</div>` : ''}

    <div class="lab-actions">${actions}</div>

    <div class="ask-card">
      <div class="ask-head">Ask about this lab</div>
      <div class="ask-tag">Sonnet 4.6 · scoped to this lab only · prompt-cached for cheap follow-ups</div>
      <div class="ask-hist">${chat || '<div class="ask-tag">No questions yet. Ask anything about the steps, errors, or expected output.</div>'}</div>
      <div class="ask-row">
        <input type="text" class="ask-input" id="ask-input" placeholder="e.g., 'Step 4 throws ImportError — what am I missing?'" />
        <button class="btn btn-primary" data-action="ask">Send</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
//  HANDLERS
// ═══════════════════════════════════════════════════════════════════════════
function attachSubtopicHandlers() {
  const m = document.getElementById('main');

  m.querySelectorAll('[data-c-idx]').forEach(t => {
    t.addEventListener('click', () => {
      if (t.dataset.locked === '1') {
        flashMessage('Pass the previous concept Q&A first.');
        return;
      }
      V.activeConcept = parseInt(t.dataset.cIdx, 10);
      V.qaMode = false;
      renderMain();
    });
  });

  m.querySelectorAll('[data-opt]').forEach(t => {
    t.addEventListener('click', () => {
      const st = S.subtopics[V.activeSub.id];
      st.lab.selectedOption = parseInt(t.dataset.opt, 10);
      saveState();
      renderMain();
    });
  });

  m.querySelectorAll('[data-action]').forEach(b => {
    b.addEventListener('click', (e) => handleAction(b.dataset.action, b, e));
    if (b.tagName === 'INPUT' && b.type === 'checkbox') {
      b.addEventListener('change', (e) => handleAction(b.dataset.action, b, e));
    }
  });

  const askInput = document.getElementById('ask-input');
  if (askInput) {
    askInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleAction('ask');
      }
    });
  }
}

async function handleAction(action, btn, evt) {
  const subId = V.activeSub?.id;
  const st = subId ? S.subtopics[subId] : null;

  if (action === 'retry-sub')  return openSubtopic(subId, true);

  if (!st) return;

  if (action === 'start-qa')      { V.qaMode = true; renderMain(); return ensureQuestions(); }
  if (action === 'close-qa')      { V.qaMode = false; renderMain(); return; }
  if (action === 'retake-qa')     { V.qaMode = true; renderMain(); return; }
  if (action === 'regen-qa')      return regenQuestions();
  if (action === 'submit-qa')     return submitQA();
  if (action === 'request-next')  return requestNextConcept();

  if (action === 'prereq-ack')    { st.lab.prereqAck = !!btn.checked; saveState(); renderMain(); return; }
  if (action === 'start-lab')     { st.lab.status = 'inprogress'; recomputeSubStatus(subId); saveState(); renderMain(); renderSidebar(); return; }
  if (action === 'mark-lab-done') { st.lab.status = 'done'; recomputeSubStatus(subId); saveState(); renderMain(); renderSidebar(); return; }
  if (action === 'reset-lab')     { st.lab.status = 'notstarted'; st.lab.prereqAck = false; recomputeSubStatus(subId); saveState(); renderMain(); renderSidebar(); return; }
  if (action === 'ask')           return submitAsk();

  if (action === 'gen-writeup')   return generateWriteupAction();
  if (action === 'regen-writeup') {
    st.writeup = { status: 'notgenerated', substack: null, social: null, generated_at: null };
    saveState();
    return generateWriteupAction();
  }
  if (action === 'copy-substack') {
    const w = st.writeup;
    if (w?.substack) copyText(w.substack.title + '\n\n' + w.substack.body);
    return;
  }
  if (action === 'copy-social') {
    const w = st.writeup;
    if (w?.social?.text) copyText(w.social.text);
    return;
  }
}

async function generateWriteupAction() {
  const subId = V.activeSub.id;
  const st = S.subtopics[subId];
  if (!st || !st.content) return;
  st.writeup.status = 'generating';
  saveState();
  renderMain();
  try {
    const out = await generateWriteup(V.activeSub, st.content);
    st.writeup.substack = out.substack;
    st.writeup.social = out.social;
    st.writeup.status = 'generated';
    st.writeup.generated_at = new Date().toISOString();
    saveState();
    await fileCachePut(subId, { content: st.content, writeup: st.writeup });  // update file cache
    renderMain();
  } catch (e) {
    st.writeup.status = 'notgenerated';
    saveState();
    renderMain();
    flashMessage('Write-up failed: ' + (e.message || e));
  }
}

function copyText(text) {
  if (!navigator.clipboard) { flashMessage('Clipboard API unavailable'); return; }
  navigator.clipboard.writeText(text)
    .then(() => flashMessage('Copied to clipboard'))
    .catch(() => flashMessage('Copy failed'));
}

function flashMessage(msg) {
  const m = document.getElementById('main');
  const div = document.createElement('div');
  div.className = 'error-card';
  div.style.position = 'fixed';
  div.style.top = '20px';
  div.style.right = '20px';
  div.style.zIndex = '1000';
  div.style.background = '#fef3c7';
  div.style.borderColor = '#fcd34d';
  div.style.color = '#78350f';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2600);
}

async function openSubtopic(subId, forceRegen = false) {
  const meta = subMeta(subId);
  if (!meta) return;
  V.activeSub = meta;
  V.activeConcept = 0;
  V.qaMode = false;

  const st = ensureSubState(subId);
  renderSidebar();

  if (st.content && !forceRegen) {
    renderMain();
    return;
  }

  // Check file cache first (survives browser clears; gitignored local folder)
  if (!forceRegen) {
    document.getElementById('main').innerHTML =
      subHeaderHtml(meta) + loaderHtml('Checking local cache…');
    const cached = await fileCacheGet(subId);
    if (cached && cached.content) {
      st.content = cached.content;
      if (cached.writeup) st.writeup = cached.writeup;
      st.lab.selectedOption = 0;
      recomputeSubStatus(subId);
      saveState();
      renderMain();
      renderSidebar();
      return;
    }
  }

  // Nothing cached — generate with Opus (2 focused calls)
  const setLoader = msg => {
    document.getElementById('main').innerHTML = subHeaderHtml(meta) + loaderHtml(msg);
  };
  setLoader('Starting generation — 2 steps, ~30–60s each');

  try {
    const content = await generateSubtopic(meta, setLoader);
    st.content = content;
    st.lab.selectedOption = 0;
    st.lab.prereqAck = false;
    recomputeSubStatus(subId);
    saveState();
    await fileCachePut(subId, { content: st.content });   // persist to file cache
    renderMain();
    renderSidebar();
  } catch (e) {
    const missingProxy = /(Failed to fetch|NetworkError|ERR_CONNECTION_REFUSED)/i.test(e.message || '');
    const body = missingProxy
      ? `Could not reach the proxy at <code>${esc(PROXY_URL)}</code>. Is it running? Run <code>start.bat</code> from the project folder.`
      : `${esc(e.message || String(e))}`;
    document.getElementById('main').innerHTML =
      subHeaderHtml(meta) + errorHtml('Generation failed', body, 'Retry');
    document.querySelectorAll('[data-action="retry-sub"]').forEach(b =>
      b.addEventListener('click', () => openSubtopic(subId, true)));
  }
}

async function ensureQuestions() {
  const subId = V.activeSub.id;
  const st = S.subtopics[subId];
  const concept = st.content.concepts[V.activeConcept];
  if (!st.concepts[concept.id]) st.concepts[concept.id] = { status: 'reading' };
  const cs = st.concepts[concept.id];
  if (cs.questions && cs.questions.length) return;

  // Show QA card with loader
  renderMain();
  try {
    const qs = await generateQA(concept);
    cs.questions = qs;
    cs.answers = cs.answers || {};
    cs.status = cs.status === 'passed' ? 'passed' : 'reading';
    saveState();
    renderMain();
  } catch (e) {
    const loader = document.getElementById('qa-loader');
    if (loader) loader.innerHTML = `<div class="error-card">Could not generate questions: ${esc(e.message)}</div>`;
  }
}

async function regenQuestions() {
  const subId = V.activeSub.id;
  const st = S.subtopics[subId];
  const concept = st.content.concepts[V.activeConcept];
  const cs = st.concepts[concept.id];
  if (!cs) return;
  cs.questions = null;
  cs.answers   = {};
  cs.eval      = null;
  cs.status    = 'reading';
  saveState();
  await ensureQuestions();
}

async function submitQA() {
  const subId = V.activeSub.id;
  const st = S.subtopics[subId];
  const concept = st.content.concepts[V.activeConcept];
  const cs = st.concepts[concept.id];
  if (!cs || !cs.questions) return;

  // Collect selected MCQ options from radio buttons
  cs.answers = cs.answers || {};
  document.querySelectorAll('.mcq-option input[type="radio"]:checked').forEach(r => {
    cs.answers[r.dataset.qid] = r.value;
  });
  saveState();

  // Score client-side — no API call
  const res = scoreMCQ(cs.questions, cs.answers);
  cs.eval = res;
  cs.status = res.passed ? 'passed' : 'reading';
  recomputeSubStatus(subId);
  saveState();
  renderMain();
  renderSidebar();
}

function requestNextConcept() {
  const subId = V.activeSub.id;
  const st = S.subtopics[subId];
  const next = V.activeConcept + 1;
  if (next >= st.content.concepts.length) return;
  V.activeConcept = next;
  V.qaMode = false;
  renderMain();
}

async function submitAsk() {
  const input = document.getElementById('ask-input');
  if (!input) return;
  const q = input.value.trim();
  if (!q) return;
  if (V.labAskBusy) return;

  const subId = V.activeSub.id;
  const st = S.subtopics[subId];
  const lab = st.content.lab;

  st.lab.chat = st.lab.chat || [];
  st.lab.chat.push({ role: 'user', text: q });
  input.value = '';
  V.labAskBusy = true;
  saveState();
  renderMain();

  try {
    const resp = await askLab(lab, st.lab.chat.slice(0, -1), q);
    st.lab.chat.push({ role: 'assistant', text: resp });
    V.labAskBusy = false;
    saveState();
    renderMain();
    // Focus input again
    setTimeout(() => document.getElementById('ask-input')?.focus(), 50);
  } catch (e) {
    V.labAskBusy = false;
    st.lab.chat.push({ role: 'assistant', text: 'Error: ' + (e.message || e) });
    saveState();
    renderMain();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════════
function setSidebarState(open) {
  const app  = document.querySelector('.app');
  const btn  = document.getElementById('sidebar-toggle');
  if (open) {
    app.classList.add('sidebar-open');
    btn.style.left  = '308px';
    btn.textContent = '✕ Close';
    btn.title       = 'Close curriculum';
  } else {
    app.classList.remove('sidebar-open');
    btn.style.left  = '12px';
    btn.textContent = '☰ Curriculum';
    btn.title       = 'Open curriculum';
  }
  try { localStorage.setItem('aieng-sidebar', open ? '1' : '0'); } catch {}
}

function toggleSidebar() {
  setSidebarState(!document.querySelector('.app').classList.contains('sidebar-open'));
}

function init() {
  renderSidebar();
  renderMain();
  // Restore sidebar preference; default closed
  setSidebarState(localStorage.getItem('aieng-sidebar') === '1');
}
init();
</script>
